name: Model Training
on: [push]

jobs:
    train-model:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout Repository
            uses: actions/checkout@v7
          - name: Set up Python
            uses: actions/setup-python@v6
            with:
              python-version: '3.14'
          - name: Install dependencies
            run: |
                pip install --upgrade pip
                pip install -r requirements.txt
          - name: Train model
            run: |
              python src/train.py
          - uses: actions/upload-artifact@v7
            with:
              name: Python_lernen.pickle
              path: data/models/Python_lernen.pickle
          - name: Run tests
            run: |
              pytest
